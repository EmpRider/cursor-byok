name: Release Tag Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.0.39"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  GO_VERSION_FILE: go.mod
  NODE_VERSION: "22"
  TASK_VERSION: "3.x"
  WAILS3_VERSION: "v3.0.0-alpha.74"

jobs:
  validate-release-ref:
    name: Validate release tag
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      release_branch: ${{ steps.release.outputs.release_branch }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate tag is on main branch
        id: release
        run: |
          set -euo pipefail

          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v0.0.39, got: $tag" >&2
            exit 1
          fi

          git fetch --force origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'

          # Git tags do not technically belong to a branch. We enforce the release
          # rule by requiring the tagged commit to be contained by main.
          release_branch="main"

          tag_sha="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$tag_sha" "origin/$release_branch"; then
            echo "Tagged commit $tag_sha is not contained in origin/$release_branch" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
          echo "Building release tag $tag from $release_branch" >> "$GITHUB_STEP_SUMMARY"

  build-linux:
    name: Build Linux amd64
    needs: validate-release-ref
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            zip \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build Linux release assets
        run: task release:prepare:linux SCAN=false

      - name: List Linux build files
        run: |
          release_dir="$(find bin/release -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          test -n "$release_dir"
          find "$release_dir" -maxdepth 1 -type f | sort | while read -r file; do basename "$file"; done | tee linux-build-files.txt

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            bin/release/*/*.tar.gz
            bin/release/*/.release-notes.md
            linux-build-files.txt
          if-no-files-found: error

  build-macos-windows:
    name: Build macOS and Windows assets
    needs: validate-release-ref
    runs-on: macos-15
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build macOS and Windows release assets
        run: |
          task release:clean
          task common:update:build-assets
          task release:notes
          task release:build:macos:arm64 SCAN=false
          task release:build:macos:amd64 SCAN=false
          task release:build:windows:amd64 SCAN=false

      - name: List macOS and Windows build files
        run: |
          release_dir="$(find bin/release -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          test -n "$release_dir"
          find "$release_dir" -maxdepth 1 -type f | sort | while read -r file; do basename "$file"; done | tee macos-windows-build-files.txt

      - name: Upload macOS and Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-windows
          path: |
            bin/release/*/*.tar.gz
            bin/release/*/*.zip
            bin/release/*/.release-notes.md
            macos-windows-build-files.txt
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    needs:
      - validate-release-ref
      - build-linux
      - build-macos-windows
    runs-on: ubuntu-22.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release files and file list
        id: files
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '.release-notes.md' \) -exec cp {} release-assets/ \;

          notes_file="release-assets/.release-notes.md"
          if [[ ! -s "$notes_file" ]]; then
            printf 'Release %s\n' "${{ needs.validate-release-ref.outputs.tag }}" > "$notes_file"
          fi

          {
            echo "## Build files"
            echo
            find release-assets -maxdepth 1 -type f ! -name '.release-notes.md' | sort | while read -r file; do printf -- '- `%s`\n' "$(basename "$file")"; done
          } | tee build-files.md

          cat "$notes_file" > release-body.md
          echo >> release-body.md
          cat build-files.md >> release-body.md

          echo "Release files:" >> "$GITHUB_STEP_SUMMARY"
          cat build-files.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.tag }}
          name: ${{ needs.validate-release-ref.outputs.tag }}
          body_path: release-body.md
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
          fail_on_unmatched_files: true
          make_latest: true
