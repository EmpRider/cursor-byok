name: Release Tag Build

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, for example v0.0.44. Leave empty to auto-increment the latest patch tag."
        required: false
        type: string
      target_ref:
        description: "Target branch, tag, or commit to release. Defaults to main."
        required: false
        default: main
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-build-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  GO_VERSION_FILE: go.mod
  NODE_VERSION: "22"
  TASK_VERSION: "3.x"
  WAILS3_VERSION: "v3.0.0-alpha.74"
  PROTOC_VERSION: "25.3"
  PROTOC_GEN_GO_VERSION: "v1.36.11"
  PROTOC_GEN_CONNECT_GO_VERSION: "v1.19.1"

jobs:
  validate-release-ref:
    name: Resolve release tag
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      app_version: ${{ steps.release.outputs.app_version }}
      target_sha: ${{ steps.release.outputs.target_sha }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}
      release_branch: main
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve release tag and target commit
        id: release
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
          TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || '' }}
        run: |
          set -euo pipefail

          git fetch --force origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            target_sha="$MERGE_COMMIT_SHA"
          else
            target_sha="$(git rev-list -n 1 "$TARGET_REF")"
          fi

          if [[ -z "$target_sha" ]]; then
            echo "Could not resolve release target commit." >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$target_sha" origin/main; then
            echo "Release target $target_sha is not contained in origin/main" >&2
            exit 1
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"

          if [[ -n "$REQUESTED_TAG" ]]; then
            tag="$REQUESTED_TAG"
          elif [[ -z "$latest_tag" ]]; then
            tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch="$((patch + 1))"
            tag="v${major}.${minor}.${patch}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v0.0.44, got: $tag" >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$existing_sha" != "$target_sha" ]]; then
              echo "Tag $tag already exists at $existing_sha, not target $target_sha" >&2
              exit 1
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "app_version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"

          {
            echo "Release tag: $tag"
            echo "Version: ${tag#v}"
            echo "Target commit: $target_sha"
            echo "Previous tag: ${latest_tag:-none}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-linux:
    name: Build Linux amd64
    needs: validate-release-ref
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release-ref.outputs.target_sha }}

      - name: Set build version from tag
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ needs.validate-release-ref.outputs.app_version }}" python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("build/config.yml")
          lines = path.read_text().splitlines()
          in_info = False
          updated = False

          for index, line in enumerate(lines):
              if line.startswith("info:"):
                  in_info = True
                  continue
              if in_info and line and not line.startswith((" ", "\t")):
                  in_info = False
              if in_info and line.lstrip().startswith("version:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f'{indent}version: "{os.environ["RELEASE_VERSION"]}"'
                  updated = True
                  break

          if not updated:
              raise SystemExit("build/config.yml info.version was not found")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            pkg-config \
            unzip \
            zip \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev

      - name: Install modern protoc
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          mkdir -p "$HOME/.local"
          unzip -o /tmp/protoc.zip -d "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          protoc --version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Install protobuf Go plugins
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@${{ env.PROTOC_GEN_CONNECT_GO_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          protoc --version
          protoc-gen-go --version
          protoc-gen-connect-go --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Verify proto generation
        run: task common:generate:proto

      - name: Build Linux release assets
        run: task release:prepare:linux SCAN=false

      - name: List Linux build files
        run: |
          release_dir="$(find bin/release -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          test -n "$release_dir"
          find "$release_dir" -maxdepth 1 -type f | sort | while read -r file; do basename "$file"; done | tee linux-build-files.txt

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            bin/release/*/*.tar.gz
            bin/release/*/.release-notes.md
            linux-build-files.txt
          if-no-files-found: error

  build-macos-windows:
    name: Build macOS and Windows assets
    needs: validate-release-ref
    runs-on: macos-15
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release-ref.outputs.target_sha }}

      - name: Set build version from tag
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ needs.validate-release-ref.outputs.app_version }}" python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("build/config.yml")
          lines = path.read_text().splitlines()
          in_info = False
          updated = False

          for index, line in enumerate(lines):
              if line.startswith("info:"):
                  in_info = True
                  continue
              if in_info and line and not line.startswith((" ", "\t")):
                  in_info = False
              if in_info and line.lstrip().startswith("version:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f'{indent}version: "{os.environ["RELEASE_VERSION"]}"'
                  updated = True
                  break

          if not updated:
              raise SystemExit("build/config.yml info.version was not found")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Install protobuf tools
        run: |
          set -euo pipefail
          brew list protobuf >/dev/null 2>&1 || brew install protobuf
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@${{ env.PROTOC_GEN_CONNECT_GO_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          protoc --version
          protoc-gen-go --version
          protoc-gen-connect-go --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Verify proto generation
        run: task common:generate:proto

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build macOS and Windows release assets
        run: |
          set -euo pipefail

          task release:clean
          task common:update:build-assets

          app_version="$(go run ./scripts/release version -config ./build/config.yml)"
          app_name="Cursor助手"
          release_dir="bin/release/${app_version}"
          release_base_name="cursor-byok"

          go run ./scripts/release notes \
            -config ./build/config.yml \
            -out "${release_dir}/.release-notes.md" \
            -source release-notes.md

          task release:build:macos:arm64 SCAN=false

          # The repository's release:build:macos:amd64 task is internal, so reproduce
          # the same package:archive steps here without invoking internal tasks directly.
          go mod tidy
          task common:generate:icons

          output="bin/cursor-release-macos-amd64"
          app_bundle="${app_name}.app"
          archive_path="${release_dir}/${release_base_name}-${app_version}-macos-amd64.tar.gz"

          GOOS=darwin \
          CGO_ENABLED=1 \
          GOARCH=amd64 \
          CGO_CFLAGS="-mmacosx-version-min=10.15" \
          CGO_LDFLAGS="-mmacosx-version-min=10.15" \
          MACOSX_DEPLOYMENT_TARGET="10.15" \
            go build -tags production -trimpath -buildvcs=false \
              -ldflags "-w -s -X cursor/internal/buildinfo.Version=${app_version}" \
              -o "${output}"

          rm -rf "bin/${app_bundle}"
          mkdir -p "bin/${app_bundle}/Contents/MacOS"
          mkdir -p "bin/${app_bundle}/Contents/Resources"
          cp build/darwin/icons.icns "bin/${app_bundle}/Contents/Resources"
          cp "${output}" "bin/${app_bundle}/Contents/MacOS/${app_name}"
          cp build/darwin/Info.plist "bin/${app_bundle}/Contents"
          codesign --force --deep --sign - "bin/${app_bundle}"
          rm -f "${archive_path}"
          env LC_ALL=C tar -C bin -czf "${archive_path}" "${app_bundle}"
          rm -f "${output}"
          rm -rf "bin/${app_bundle}"

          task release:build:windows:amd64 SCAN=false

      - name: List macOS and Windows build files
        run: |
          release_dir="$(find bin/release -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          test -n "$release_dir"
          find "$release_dir" -maxdepth 1 -type f | sort | while read -r file; do basename "$file"; done | tee macos-windows-build-files.txt

      - name: Upload macOS and Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-windows
          path: |
            bin/release/*/*.tar.gz
            bin/release/*/*.zip
            bin/release/*/.release-notes.md
            macos-windows-build-files.txt
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    needs:
      - validate-release-ref
      - build-linux
      - build-macos-windows
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release-ref.outputs.target_sha }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release files and release body
        id: files
        env:
          RELEASE_TAG: ${{ needs.validate-release-ref.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-release-ref.outputs.app_version }}
          TARGET_SHA: ${{ needs.validate-release-ref.outputs.target_sha }}
          PREVIOUS_TAG: ${{ needs.validate-release-ref.outputs.previous_tag }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '.release-notes.md' \) -exec cp {} release-assets/ \;

          notes_file="release-assets/.release-notes.md"
          if [[ ! -s "$notes_file" ]]; then
            printf 'Release %s\n' "$RELEASE_TAG" > "$notes_file"
          fi

          {
            echo "## Build files"
            echo
            find release-assets -maxdepth 1 -type f ! -name '.release-notes.md' | sort | while read -r file; do printf -- '- `%s`\n' "$(basename "$file")"; done
          } | tee build-files.md

          compare_url=""
          if [[ -n "$PREVIOUS_TAG" ]]; then
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${RELEASE_TAG}"
          fi

          {
            echo "# Release ${RELEASE_TAG}"
            echo
            echo "## Overview"
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              echo "Automatic release created after PR #${PR_NUMBER} was merged into main."
            else
              echo "Manual release created from the GitHub Actions workflow."
            fi
            echo
            echo "## Source"
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Branch: main"
            echo "- Version: ${RELEASE_VERSION}"
            echo "- Commit: ${TARGET_SHA}"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "- Previous release: ${PREVIOUS_TAG}"
            else
              echo "- Previous release: none"
            fi
            if [[ -n "$compare_url" ]]; then
              echo "- Compare: ${compare_url}"
            fi
            echo
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              echo "## Merged pull request"
              echo "- PR: #${PR_NUMBER} ${PR_TITLE}"
              echo "- Author: ${PR_AUTHOR}"
              echo "- URL: ${PR_URL}"
              echo
            fi
            echo "## Changes since previous release"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              git log --pretty=format:'- %h %s (%an)' "${PREVIOUS_TAG}..${TARGET_SHA}" || true
            else
              git log --pretty=format:'- %h %s (%an)' "${TARGET_SHA}" || true
            fi
            echo
            echo
            echo "## Release notes"
            cat "$notes_file"
            echo
            cat build-files.md
          } > release-body.md

          echo "Release files:" >> "$GITHUB_STEP_SUMMARY"
          cat build-files.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.tag }}
          target_commitish: ${{ needs.validate-release-ref.outputs.target_sha }}
          name: ${{ needs.validate-release-ref.outputs.tag }}
          body_path: release-body.md
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
          fail_on_unmatched_files: true
          make_latest: true
